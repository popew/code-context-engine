<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <style>
    @keyframes reveal {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .line { opacity: 0; animation: reveal 0.01s forwards; }
    /* Step 1: Install */
    .l1  { animation-delay: 0.3s; }
    .l2  { animation-delay: 1.0s; }
    /* Step 2: Init */
    .l3  { animation-delay: 2.0s; }
    .l4  { animation-delay: 2.8s; }
    .l5  { animation-delay: 3.0s; }
    .l6  { animation-delay: 3.2s; }
    .l7  { animation-delay: 3.5s; }
    .l8  { animation-delay: 3.8s; }
    /* Step 3: Status */
    .l9  { animation-delay: 5.0s; }
    .l10 { animation-delay: 5.8s; }
    .l11 { animation-delay: 6.0s; }
    .l12 { animation-delay: 6.2s; }
    /* Step 4: Savings */
    .l13 { animation-delay: 7.5s; }
    .l14 { animation-delay: 8.2s; }
    .l15 { animation-delay: 8.5s; }
    .l16 { animation-delay: 8.8s; }
    .l17 { animation-delay: 9.1s; }
    text { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; }
    .prompt { fill: #a6e3a1; }
    .output { fill: #cdd6f4; }
    .number { fill: #f9e2af; }
    .title-text { fill: #6c7086; font-size: 13px; }
    .separator { fill: #45475a; }
  </style>
  <defs>
    <clipPath id="terminal-clip">
      <rect x="0" y="36" width="800" height="444" rx="0"/>
    </clipPath>
  </defs>
  <!-- Terminal window -->
  <rect width="800" height="480" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#181825"/>
  <rect y="26" width="800" height="10" fill="#181825"/>
  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="title-text">code-context-engine demo</text>

  <g clip-path="url(#terminal-clip)">
    <!-- Step 1: Install -->
    <text y="62" x="16" class="line l1">
      <tspan class="prompt">$ </tspan><tspan class="output">pip install code-context-engine</tspan>
    </text>
    <text y="80" x="16" class="line l2 output">Successfully installed code-context-engine-<tspan class="number">0.3.1</tspan></text>

    <!-- Step 2: Init -->
    <text y="110" x="16" class="line l3">
      <tspan class="prompt">$ </tspan><tspan class="output">cd my-project &amp;&amp; code-context-engine init</tspan>
    </text>
    <text y="128" x="16" class="line l4 output">Git hooks installed: <tspan class="number">2</tspan> hooks</text>
    <text y="146" x="16" class="line l5 output">Storage directory: ~/.code-context-engine/projects/my-project/</text>
    <text y="164" x="16" class="line l6 output">Running initial index...</text>
    <text y="182" x="16" class="line l7 output">Indexed <tspan class="number">847</tspan> chunks from <tspan class="number">156</tspan> files</text>
    <text y="200" x="16" class="line l8 output">Initialization complete.</text>

    <!-- Step 3: Status -->
    <text y="230" x="16" class="line l9">
      <tspan class="prompt">$ </tspan><tspan class="output">code-context-engine status</tspan>
    </text>
    <text y="248" x="16" class="line l10 output">Storage path: ~/.code-context-engine/projects/my-project</text>
    <text y="266" x="16" class="line l11">
      <tspan class="output">Output compression: </tspan><tspan class="prompt">standard</tspan><tspan class="output"> — Drops articles, uses fragments. ~</tspan><tspan class="number">65%</tspan><tspan class="output"> savings.</tspan>
    </text>
    <text y="284" x="16" class="line l12">
      <tspan class="output">Resource profile: </tspan><tspan class="prompt">standard</tspan>
    </text>

    <!-- Step 4: Savings summary -->
    <text y="320" x="16" class="line l13 prompt">Context Engine Active</text>
    <text y="340" x="16" class="line l14">
      <tspan class="output">├── Input compression:  </tspan><tspan class="number">80%</tspan><tspan class="output"> savings (</tspan><tspan class="number">50k</tspan><tspan class="output"> → </tspan><tspan class="number">10k</tspan><tspan class="output"> tokens)</tspan>
    </text>
    <text y="360" x="16" class="line l15">
      <tspan class="output">├── Output compression: </tspan><tspan class="number">65%</tspan><tspan class="output"> savings (</tspan><tspan class="number">20k</tspan><tspan class="output"> → </tspan><tspan class="number">7k</tspan><tspan class="output"> tokens)</tspan>
    </text>
    <text y="380" x="16" class="line l16">
      <tspan class="output">└── Total cost saving:  </tspan><tspan class="number">70%</tspan><tspan class="output"> (</tspan><tspan class="number">$2.25</tspan><tspan class="output"> → </tspan><tspan class="number">$0.68</tspan><tspan class="output"> per session)</tspan>
    </text>

    <!-- Blinking cursor at end -->
    <rect x="16" y="400" width="8" height="16" fill="#a6e3a1" class="line l17" style="animation: reveal 0.01s 9.5s forwards, cursor-blink 1s 9.5s infinite;"/>
  </g>
</svg>
