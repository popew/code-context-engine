<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0d1c34"/>
    </linearGradient>
    <filter id="glow-sm" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Ambient glow behind bottom bar -->
  <rect x="76" y="332" width="90" height="40" rx="20" fill="#00c8f0" filter="url(#glow-lg)" opacity="0.45"/>

  <!-- Bar 1 — widest, dimmest -->
  <rect x="76" y="120" width="300" height="38" rx="19" fill="#1b3b66" opacity="0.45"/>

  <!-- Bar 2 -->
  <rect x="76" y="176" width="238" height="38" rx="19" fill="#1a4e78" opacity="0.58"/>

  <!-- Bar 3 -->
  <rect x="76" y="232" width="175" height="38" rx="19" fill="#006b9c" opacity="0.72"/>

  <!-- Bar 4 -->
  <rect x="76" y="288" width="118" height="38" rx="19" fill="#0094c2" opacity="0.86"/>

  <!-- Bar 5 — narrowest, brightest, glowing -->
  <rect x="76" y="344" width="72" height="38" rx="19" fill="#00c8f0" filter="url(#glow-sm)"/>

  <!-- Right-pointing arrow after bar 5 -->
  <text x="164" y="372" fill="#00c8f0" font-family="system-ui" font-size="30" opacity="0.55">›</text>

  <!-- Left-edge node dots -->
  <circle cx="76" cy="139" r="5" fill="#2a5080" opacity="0.5"/>
  <circle cx="76" cy="195" r="5" fill="#2a607a" opacity="0.6"/>
  <circle cx="76" cy="251" r="5" fill="#0077a8" opacity="0.72"/>
  <circle cx="76" cy="307" r="5" fill="#009ec8" opacity="0.86"/>
  <circle cx="76" cy="363" r="5" fill="#00c8f0" filter="url(#glow-sm)"/>

  <!-- Divider -->
  <line x1="72" y1="408" x2="440" y2="408" stroke="#1c3050" stroke-width="1" opacity="0.6"/>

  <!-- CCE text -->
  <text x="256" y="455" text-anchor="middle" fill="#e2eeff" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="10">CCE</text>

  <!-- Subtitle -->
  <text x="256" y="486" text-anchor="middle" fill="#3a5a80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" letter-spacing="5">CONTEXT ENGINE</text>
</svg>
